<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workflow Automation Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        .upload-section:hover {
            background: #e8eaf6;
            border-color: #764ba2;
        }
        .upload-section.dragover {
            background: #e8eaf6;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        input[type="file"] { display: none; }
        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .upload-text {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }
        .upload-hint {
            font-size: 0.9em;
            color: #999;
        }
        .progress-section {
            display: none;
            margin: 30px 0;
        }
        .progress-section.active {
            display: block;
        }
        .progress-label {
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            display: none;
        }
        .stats.active {
            display: grid;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        .results-section {
            margin-top: 30px;
            display: none;
        }
        .results-section.active {
            display: block;
        }
        .results-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .result-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .badge-urgent { background: #ffebee; color: #c62828; }
        .badge-normal { background: #e3f2fd; color: #1565c0; }
        .badge-low { background: #f3e5f5; color: #6a1b9a; }
        .badge-positive { background: #e8f5e9; color: #2e7d32; }
        .badge-negative { background: #ffebee; color: #c62828; }
        .badge-neutral { background: #f5f5f5; color: #616161; }
        .summary { 
            font-size: 0.95em;
            color: #555;
            font-style: italic;
            padding: 10px;
            background: white;
            border-radius: 5px;
            margin-top: 8px;
        }
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .chart { display: none; }
        .chart.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Workflow Automation</h1>
        <div class="subtitle">Automated Pipeline for CSV Ingestion, Validation & AI Classification</div>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drag and drop your CSV file here</div>
            <div class="upload-hint">or click to select (max 50MB)</div>
            <input type="file" id="fileInput" accept=".csv">
        </div>
        
        <div class="progress-section" id="progressSection">
            <div class="progress-label">Processing: <span id="progressText">0%</span></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">
                    <span id="progressPercent">0%</span>
                </div>
            </div>
        </div>
        
        <div class="stats" id="statsSection">
            <div class="stat-box">
                <div class="stat-label">Total Records</div>
                <div class="stat-value" id="totalRecords">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Processed</div>
                <div class="stat-value" id="processedRecords">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="successRate">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Time/Record</div>
                <div class="stat-value" id="avgTime">0ms</div>
            </div>
        </div>
        
        <div class="results-section" id="resultsSection">
            <div class="results-title">📊 Processing Results</div>
            <div id="resultsList"></div>
        </div>
    </div>
    
    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const progressSection = document.getElementById('progressSection');
        const statsSection = document.getElementById('statsSection');
        const resultsSection = document.getElementById('resultsSection');
        let currentJobId = null;
        let pollInterval = null;
        
        uploadSection.addEventListener('click', () => fileInput.click());
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });
        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });
        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });
        
        async function handleFile(file) {
            if (!file.name.endsWith('.csv')) {
                alert('Please upload a CSV file');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                uploadSection.style.display = 'none';
                progressSection.classList.add('active');
                
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                currentJobId = data.job_id;
                
                pollStatus();
                pollInterval = setInterval(pollStatus, 500);
            } catch (error) {
                alert('Error uploading file: ' + error);
                location.reload();
            }
        }
        
        async function pollStatus() {
            try {
                const response = await fetch(`/status/${currentJobId}`);
                const data = await response.json();
                
                const progress = data.progress_percent;
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
                document.getElementById('progressText').textContent = Math.round(progress) + '%';
                
                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    fetchResults();
                }
            } catch (error) {
                console.error('Error polling status:', error);
            }
        }
        
        async function fetchResults() {
            try {
                const response = await fetch(`/results/${currentJobId}`);
                const data = await response.json();
                
                statsSection.classList.add('active');
                document.getElementById('totalRecords').textContent = data.summary.total_records;
                document.getElementById('processedRecords').textContent = data.summary.processed_records;
                document.getElementById('successRate').textContent = Math.round(data.summary.success_rate) + '%';
                document.getElementById('avgTime').textContent = Math.round(data.statistics.avg_time_per_record_ms) + 'ms';
                
                displayResults(data.results);
                resultsSection.classList.add('active');
            } catch (error) {
                console.error('Error fetching results:', error);
            }
        }
        
        function displayResults(results) {
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'result-item';
                
                const priorityBadge = `<span class="badge badge-${result.classification.priority}">${result.classification.priority.toUpperCase()}</span>`;
                const sentimentBadge = `<span class="badge badge-${result.classification.sentiment}">${result.classification.sentiment.toUpperCase()}</span>`;
                
                item.innerHTML = `
                    <div class="result-title">Record #${result.id}</div>
                    <div>
                        ${priorityBadge}
                        ${sentimentBadge}
                        <span class="badge" style="background: #f3e5f5; color: #6a1b9a;">Confidence: ${(result.classification.confidence * 100).toFixed(0)}%</span>
                    </div>
                    <div class="summary">${result.summary}</div>
                `;
                
                resultsList.appendChild(item);
            });
        }
    </script>
</body>
</html>
