env: stage
debug: false
api:
  host: "0.0.0.0"
  port: 8000
  log_level: INFO

processing:
  max_workers: 4
  queue_max_size: 200
  max_file_size_mb: 500

s3:
  bucket: ai-workflow-automation-stage
  prefix: incoming/
  polling_interval_seconds: 20

aws:
  region: us-east-1
  secrets_manager_enabled: true

datadog:
  enabled: true
  site: datadoghq.com
  agent_host: datadog-agent
  agent_port: 8126
  service: ai-workflow-automation
  version: "2.0.0"
  env: stage
  trace:
    enabled: true
    sample_rate: 0.5
    debug: false
  metrics:
    enabled: true
    namespace: ai_workflow
  profiler:
    enabled: false
  logging:
    json: true
    correlation: true
