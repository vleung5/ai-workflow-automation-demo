env: dev
debug: true
api:
  host: "0.0.0.0"
  port: 8000
  log_level: DEBUG

processing:
  max_workers: 2
  queue_max_size: 100
  max_file_size_mb: 100

s3:
  bucket: ai-workflow-automation-dev
  prefix: incoming/
  polling_interval_seconds: 10

aws:
  region: us-east-1
  secrets_manager_enabled: false

datadog:
  enabled: true
  site: datadoghq.com
  agent_host: datadog-agent
  agent_port: 8126
  service: ai-workflow-automation
  version: "2.0.0"
  env: dev
  trace:
    enabled: true
    sample_rate: 0.1
    debug: true
  metrics:
    enabled: true
    namespace: ai_workflow
  profiler:
    enabled: false
  logging:
    json: true
    correlation: true
